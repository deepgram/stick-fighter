<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick Fighter — Deepgram</title>
  <style>
    :root {
      --dg-primary: #13ef95;
      --dg-secondary: #149afb;
      --dg-almost-blk: #050506;
      --dg-bg: #0b0b0c;
      --dg-charcoal: #1a1a1f;
      --dg-border: #2c2c33;
      --dg-pebble: #4e4e52;
      --dg-slate: #949498;
      --dg-text: #fbfbff;
      --dg-grad-start: #008fc1;
      --dg-grad-end: #00f099;
      --dg-danger: #f04438;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: monospace; }
    body { background: var(--dg-bg); color: var(--dg-text); display: flex; flex-direction: column; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 50px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
      border-image: linear-gradient(to right, transparent 10%, var(--dg-grad-start) 30%, var(--dg-grad-end) 70%, transparent 90%) 1;
      opacity: 0.5;
    }
    .header img { height: 22px; }
    .header h1 { font-size: 18px; font-weight: bold; letter-spacing: 2px; }

    /* ── Canvas ── */
    canvas {
      display: none;
      flex: 1;
      width: 100%;
    }
    canvas.active { display: block; }

    /* ── Onboarding ── */
    .onboarding {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px;
    }
    .onboarding.hidden { display: none; }

    .onboarding h2 {
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(to right, var(--dg-grad-start), var(--dg-grad-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Player cards ── */
    .players {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .player-card {
      background: var(--dg-charcoal);
      border: 1px solid var(--dg-border);
      border-radius: 8px;
      padding: 16px 24px;
      min-width: 310px;
      height: 210px;
      text-align: center;
    }
    .player-card h3 {
      font-size: 15px;
      margin-bottom: 4px;
    }
    .player-card.p1 h3 { color: var(--dg-primary); }
    .player-card.p2 h3 { color: var(--dg-secondary); }

    .select-hint {
      font-size: 10px;
      color: var(--dg-pebble);
      margin-bottom: 10px;
    }

    /* ── Mode pills ── */
    .mode-pills {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .mode-pill {
      font-family: monospace;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      border: 2px solid var(--dg-border);
      background: var(--dg-almost-blk);
      color: var(--dg-pebble);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-pill:hover {
      border-color: var(--dg-slate);
      color: var(--dg-text);
    }
    .mode-pill.selected {
      color: var(--dg-text);
    }
    .p1 .mode-pill.selected {
      border-color: var(--dg-primary);
      background: rgba(19, 239, 149, 0.1);
    }
    .p2 .mode-pill.selected {
      border-color: var(--dg-secondary);
      background: rgba(20, 154, 251, 0.1);
    }

    /* ── Provider sub-pills (LLM model picker) ── */
    .provider-pills {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 6px;
    }
    .provider-pill {
      font-family: monospace;
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid var(--dg-border);
      background: var(--dg-almost-blk);
      color: var(--dg-pebble);
      cursor: pointer;
      transition: all 0.15s;
    }
    .provider-pill:hover {
      border-color: var(--dg-slate);
      color: var(--dg-text);
    }
    .provider-pill.selected {
      color: var(--dg-text);
      border-color: var(--dg-slate);
      background: rgba(148, 148, 152, 0.15);
    }

    /* ── Controls info ── */
    .controls-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--dg-pebble);
    }

    /* ── Kbd ── */
    kbd {
      display: inline-block;
      font-family: monospace;
      font-size: 10px;
      padding: 2px 6px;
      background: var(--dg-charcoal);
      border: 1px solid var(--dg-border);
      border-bottom: 2px solid #000;
      border-radius: 3px;
      color: var(--dg-slate);
      box-shadow: 0 1px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(78,78,82,0.2);
      line-height: 1.4;
      min-width: 18px;
      text-align: center;
    }
    kbd.lg {
      font-size: 12px;
      padding: 4px 10px;
    }

    /* ── VS badge ── */
    .vs {
      font-size: 24px;
      font-weight: bold;
      color: var(--dg-pebble);
    }

    /* ── Mode description ── */
    .mode-desc {
      font-size: 10px;
      color: var(--dg-pebble);
      margin-top: 2px;
    }
    .voice-info, .llm-info, .simulated-info {
      font-size: 11px;
      color: var(--dg-slate);
    }
    .voice-info span, .llm-info span, .simulated-info span {
      color: var(--dg-pebble);
      font-size: 10px;
    }

    /* ── Bottom prompt ── */
    .start-prompt {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: bold;
      color: var(--dg-primary);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .tips {
      font-size: 11px;
      color: var(--dg-pebble);
    }

    /* ── Landing screen ── */
    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 20px;
    }
    .landing.hidden { display: none; }

    .path-cards {
      display: flex;
      gap: 24px;
    }

    .path-card {
      font-family: monospace;
      background: var(--dg-charcoal);
      border: 2px solid var(--dg-border);
      border-radius: 8px;
      padding: 32px 40px;
      min-width: 260px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .path-card:hover {
      transform: translateY(-2px);
    }
    .path-card.mp:hover { border-color: var(--dg-primary); }
    .path-card.sp:hover { border-color: var(--dg-secondary); }
    .path-card h3 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .path-card.mp h3 { color: var(--dg-primary); }
    .path-card.sp h3 { color: var(--dg-secondary); }
    .path-card p {
      font-size: 12px;
      color: var(--dg-slate);
      margin-bottom: 12px;
    }
    .path-sub {
      font-size: 10px;
      color: var(--dg-pebble);
    }

    /* ── Multiplayer menu ── */
    .multiplayer-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px;
    }
    .multiplayer-menu.hidden { display: none; }

    .mp-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 340px;
    }

    .mp-option {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--dg-charcoal);
      border: 1px solid var(--dg-border);
      border-radius: 8px;
      padding: 16px 24px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: monospace;
      color: var(--dg-text);
      text-align: left;
    }
    .mp-option:hover {
      border-color: var(--dg-primary);
      background: rgba(19, 239, 149, 0.05);
    }
    .mp-icon {
      font-size: 20px;
      width: 32px;
      text-align: center;
      color: var(--dg-primary);
    }
    .mp-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .mp-label {
      font-size: 14px;
      font-weight: bold;
    }
    .mp-desc {
      font-size: 10px;
      color: var(--dg-pebble);
    }

    .back-btn {
      font-family: monospace;
      font-size: 12px;
      color: var(--dg-pebble);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--dg-text); }

    /* ── Join room screen ── */
    .join-room {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .join-room.hidden { display: none; }

    .join-hint {
      font-size: 12px;
      color: var(--dg-slate);
    }

    .room-code-input {
      font-family: monospace;
      font-size: 20px;
      text-align: center;
      padding: 12px 24px;
      background: var(--dg-almost-blk);
      border: 2px solid var(--dg-border);
      border-radius: 8px;
      color: var(--dg-text);
      width: 320px;
      letter-spacing: 2px;
    }
    .room-code-input:focus {
      outline: none;
      border-color: var(--dg-primary);
    }
    .room-code-input::placeholder {
      color: var(--dg-pebble);
      letter-spacing: 0;
      font-size: 14px;
    }

    .join-btn {
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      padding: 10px 32px;
      border-radius: 6px;
      border: 2px solid var(--dg-primary);
      background: rgba(19, 239, 149, 0.1);
      color: var(--dg-primary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .join-btn:hover:not(:disabled) {
      background: rgba(19, 239, 149, 0.2);
    }
    .join-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

    <h1>STICK FIGHTER</h1>
  </div>

  <!-- Landing screen — mode selection -->
  <div class="landing" id="landing">
    <h2>SELECT MODE</h2>
    <div class="path-cards">
      <button class="path-card mp" id="btn-multiplayer">
        <h3>MULTIPLAYER</h3>
        <p>Fight other players online</p>
        <span class="path-sub">Create or join a room</span>
      </button>
      <button class="path-card sp" id="btn-singleplayer">
        <h3>SINGLE PLAYER</h3>
        <p>Fight AI opponents locally</p>
        <span class="path-sub">Keyboard, Voice, Phone, or AI</span>
      </button>
    </div>
  </div>

  <!-- Multiplayer menu -->
  <div class="multiplayer-menu hidden" id="multiplayer-menu">
    <h2>MULTIPLAYER</h2>
    <div class="mp-options">
      <button class="mp-option" id="btn-create-room">
        <span class="mp-icon">＋</span>
        <div class="mp-text">
          <span class="mp-label">Create Room</span>
          <span class="mp-desc">Get a shareable room code</span>
        </div>
      </button>
      <button class="mp-option" id="btn-join-room">
        <span class="mp-icon">→</span>
        <div class="mp-text">
          <span class="mp-label">Join Room</span>
          <span class="mp-desc">Enter a room code to join</span>
        </div>
      </button>
      <button class="mp-option" id="btn-matchmaking">
        <span class="mp-icon">⚔</span>
        <div class="mp-text">
          <span class="mp-label">Matchmaking</span>
          <span class="mp-desc">Find an ELO-matched opponent</span>
        </div>
      </button>
    </div>
    <button class="back-btn" id="btn-mp-back">← BACK</button>
  </div>

  <!-- Join room screen -->
  <div class="join-room hidden" id="join-room">
    <h2>JOIN ROOM</h2>
    <p class="join-hint">Enter the 3-word room code</p>
    <input type="text" class="room-code-input" id="room-code-input"
      placeholder="red-tiger-paw" autocomplete="off" spellcheck="false">
    <button class="join-btn" id="btn-join-go" disabled>JOIN</button>
    <button class="back-btn" id="btn-join-back">← BACK</button>
  </div>

  <!-- Onboarding screen (single-player fighter selection) -->
  <div class="onboarding hidden" id="onboarding">
    <h2>SELECT FIGHTERS</h2>

    <div class="players">
      <div class="player-card p1">
        <h3>PLAYER 1</h3>
        <div class="select-hint"><kbd>A</kbd> <kbd>D</kbd> select</div>
        <div class="mode-pills" data-player="1">
          <button class="mode-pill selected" data-mode="0">Keys</button>
          <button class="mode-pill" data-mode="1">Voice</button>
          <button class="mode-pill" data-mode="2">Phone</button>
          <button class="mode-pill" data-mode="3">Sim</button>
          <button class="mode-pill" data-mode="4">LLM</button>
        </div>
        <div class="controls-info" data-player="1">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="vs">VS</div>

      <div class="player-card p2">
        <h3>PLAYER 2</h3>
        <div class="select-hint"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> select</div>
        <div class="mode-pills" data-player="2">
          <button class="mode-pill selected" data-mode="0">Keys</button>
          <button class="mode-pill" data-mode="1">Voice</button>
          <button class="mode-pill" data-mode="2">Phone</button>

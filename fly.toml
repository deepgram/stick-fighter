# fly.toml app configuration file generated for stick-fighter on 2026-03-11T11:08:35-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stick-fighter'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.alive]
    port = 8080
    type = 'http'
    path = '/health'
    interval = '15s'
    timeout = '2s'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '256mb'
